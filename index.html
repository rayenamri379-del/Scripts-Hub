<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة النظام</title>
    <style>
        /* إعدادات الشاشة والخلفية */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية HUD المبسطة */
        .hud-box {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #333;
            border-radius: 4px;
            width: 85%;
            max-width: 280px; /* حجم صغير ومدمج */
            padding: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* نصوص مختصرة وواضحة */
        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 8px;
            border-bottom: 1px dashed #222;
            padding-bottom: 4px;
        }

        .hud-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .label {
            color: #888;
        }

        .status-ok {
            color: #4CAF50; /* لون التفعيل */
        }

        /* الإضافة رقم 2 التي تم استرجاعها */
        #addition-2 {
            background: #111;
            padding: 6px;
            border-right: 2px solid #4CAF50;
            margin-top: 10px;
            font-size: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="hud-box">
        <div class="hud-row">
            <span class="label">النظام:</span>
            <span class="status-ok">نشط</span>
        </div>
        
        <div class="hud-row">
            <span class="label">الشبكة:</span>
            <span class="status-ok" id="network-status">متصل</span>
        </div>

        <!-- الإضافة رقم 2 -->
        <div id="addition-2">
            [الإضافة 2]: تعمل بكفاءة في الخلفية.
        </div>
    </div>

    <script>
        // سكريبت بسيط لتحديث البيانات إن لزم الأمر مستقبلاً
        console.log("تم تحميل الواجهة بنجاح.");
        
        // مثال على تفاعل بسيط
        setTimeout(() => {
            document.getElementById('network-status').innerText = 'مستقر';
        }, 3000);
    </script>

</body>
</html>
