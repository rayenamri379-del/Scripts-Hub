<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaZzA Scripts | Monetloader & SAMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #05010a;
            --glass-bg: rgba(20, 5, 30, 0.55);
            --glass-border: rgba(157, 0, 255, 0.4);
            --neon-purple: #9d00ff; 
            --neon-glow: #6a0dad;
            --text-main: #ffffff;
            --text-muted: #b39ddb;
            --card-bg: rgba(10, 2, 17, 0.8);
            --danger: #ff3333;
            --success: #00ffcc;
            --ban-color: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); background-image: radial-gradient(circle at 15% 50%, rgba(157, 0, 255, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(106, 13, 173, 0.15), transparent 25%); background-attachment: fixed; min-height: 100vh; overflow-x: hidden; }

        /* Banned Screen */
        #banned-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: var(--ban-color); text-align: center; padding: 20px; }
        #banned-screen h1 { font-size: 4rem; text-shadow: 0 0 20px var(--ban-color); margin-bottom: 20px; }

        /* App Content */
        #app-content { display: none; opacity: 0; transition: opacity 0.5s ease-in; }
        #app-content.visible { display: block; opacity: 1; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); background-image: radial-gradient(circle at 50% 50%, rgba(157, 0, 255, 0.15), transparent 60%); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-container { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-top: 3px solid var(--neon-purple); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(157, 0, 255, 0.2); text-align: center; }
        .auth-logo { font-size: 2rem; font-weight: 900; color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); letter-spacing: 2px; margin-bottom: 30px; }
        .auth-toggle { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .auth-toggle button { flex: 1; background: none; border: none; padding: 10px; color: var(--text-muted); font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .auth-toggle button.active { color: var(--neon-purple); border-bottom: 2px solid var(--neon-purple); text-shadow: 0 0 8px rgba(157, 0, 255, 0.5); }
        .auth-form { display: none; animation: fadeIn 0.4s ease-out; }
        .auth-form.active { display: block; }
        .auth-msg { font-size: 0.85rem; margin-bottom: 15px; min-height: 20px; font-weight: 500; }
        .msg-error { color: var(--danger); text-shadow: 0 0 5px var(--danger); }
        .msg-success { color: var(--success); text-shadow: 0 0 5px var(--success); }

        /* Social Login Buttons */
        .social-login-divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 0.85rem; }
        .social-login-divider::before, .social-login-divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .social-login-divider:not(:empty)::before { margin-right: .25em; }
        .social-login-divider:not(:empty)::after { margin-left: .25em; }
        .social-btn-group { display: flex; gap: 10px; flex-direction: column; }
        .btn-social { padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 0.95rem; border: none; width: 100%; }
        .btn-google { background: #ffffff; color: #333; }
        .btn-google:hover { background: #e6e6e6; box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

        /* Navbar & Views */
        nav { background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); letter-spacing: 2px; }
        .nav-links { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .nav-links button { background: none; border: none; color: var(--text-main); font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: 0.3s; }
        .nav-links button:hover, .nav-links button.active { color: var(--neon-purple); text-shadow: 0 0 8px var(--neon-purple); }
        .login-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .login-btn:hover { background: var(--danger); border-color: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }
        
        .admin-only { display: none; }
        
        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Hero & Inputs */
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 15px; background: linear-gradient(45deg, #ffffff, var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px auto; }
        .categories { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
        .search-container { max-width: 800px; margin: 0 auto 20px auto; padding: 0 20px; position: relative; }
        .form-input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 8px; color: white; font-size: 1rem; outline: none; transition: 0.3s; margin-bottom: 15px; }
        .form-input:focus { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(157, 0, 255, 0.4); }
        input[type="file"] { padding: 10px; background: rgba(0,0,0,0.5); color: var(--neon-purple); cursor: pointer; }
        input[type="file"]::-webkit-file-upload-button { background: var(--neon-purple); color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-right: 15px; cursor: pointer; }

        /* Scripts Grid */
        .scripts-container { max-width: 1100px; margin: 0 auto; padding: 0 20px 80px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .script-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-top: 3px solid var(--neon-purple); border-radius: 12px; padding: 25px; transition: all 0.4s ease; }
        .script-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(157, 0, 255, 0.3); }
        .script-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .script-title { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 10px; }
        .version-badge { background: rgba(255, 255, 255, 0.1); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; color: var(--text-muted); }
        .script-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; min-height: 60px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 15px; }
        .download-stats { font-size: 0.8rem; color: var(--neon-purple); background: rgba(157, 0, 255, 0.1); padding: 5px 10px; border-radius: 5px;}

        /* Buttons & Forms */
        .btn-action { width: 100%; background: transparent; color: var(--neon-purple); border: 1px solid var(--neon-purple); padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }
        .btn-danger { color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; box-shadow: 0 0 15px var(--danger); }
        .btn-warning { color: #ffaa00; border-color: #ffaa00; }
        .btn-warning:hover { background: #ffaa00; color: black; box-shadow: 0 0 15px #ffaa00; }
        .btn-sm { width: auto; padding: 8px 15px; font-size: 0.85rem; } 
        .form-container { max-width: 800px; margin: 40px auto; background: var(--glass-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .admin-section-box { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 10px; margin-bottom: 30px; border: 1px solid var(--glass-border); }
        .user-list-item { background: rgba(0,0,0,0.3); padding: 12px 15px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items:center; margin-bottom: 8px;}
        .loading-spinner { display: none; color: var(--neon-purple); margin: 10px auto; font-size: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="banned-screen">
        <i class="fas fa-ban" style="font-size: 6rem; margin-bottom: 20px;"></i>
        <h1>ACCESS DENIED</h1>
        <p style="font-size: 1.2rem;">Your account/device has been permanently banned.</p>
    </div>

    <div id="auth-overlay">
        <div class="auth-container">
            <div class="auth-logo">KaZzA Scripts</div>
            
            <div class="auth-toggle">
                <button id="toggle-signin" class="active" onclick="switchAuthMode('signin')">Sign In</button>
                <button id="toggle-signup" onclick="switchAuthMode('signup')">Sign Up</button>
            </div>

            <div id="auth-msg" class="auth-msg"></div>
            <i class="fas fa-spinner loading-spinner" id="auth-spinner"></i>

            <!-- Email & Password Login -->
            <form id="signin-form" class="auth-form active" onsubmit="handleSignIn(event)">
                <input type="email" id="in-email" class="form-input" placeholder="Email Address" required>
                <input type="password" id="in-password" class="form-input" placeholder="Password" required>
                <button type="submit" class="btn-action"><i class="fas fa-sign-in-alt"></i> Login with Email</button>
            </form>

            <!-- Email & Password Registration -->
            <form id="signup-form" class="auth-form" onsubmit="handleSignUp(event)">
                <input type="text" id="up-username" class="form-input" placeholder="Username" required>
                <input type="email" id="up-email" class="form-input" placeholder="Email Address" required>
                <input type="password" id="up-password" class="form-input" placeholder="New Password" required minlength="6">
                <button type="submit" class="btn-action"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
            
            <!-- Social Logins -->
            <div class="social-login-divider">OR</div>
            <div class="social-btn-group">
                <button onclick="handleGoogleLogin()" class="btn-social btn-google">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </div>
            
        </div>
    </div>

    <div id="app-content">
        <nav>
            <div class="logo">KaZzA Scripts</div>
            <div class="nav-links">
                <button onclick="switchTab('home')" id="tab-home" class="active"><i class="fas fa-home"></i> Home</button>
                <button onclick="switchTab('request')" id="tab-request"><i class="fas fa-envelope"></i> Request</button>
                <button onclick="switchTab('admin')" id="tab-admin" class="admin-only"><i class="fas fa-cogs"></i> Admin Panel</button>
                <button class="login-btn" id="logoutBtn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </nav>

        <div id="view-home" class="view-section active">
            <section class="hero">
                <h1>KaZzA Scripts Hub</h1>
                <p>The best place for SAMP Monetloader & CLEO Scripts.</p>
            </section>
            <div class="search-container">
                <input type="text" id="searchInput" class="form-input" placeholder="Search scripts by name or description...">
            </div>
            <div class="categories" id="categoryFilters"></div>
            <div class="scripts-container" id="scriptsGrid"></div>
        </div>

        <div id="view-request" class="view-section">
            <div class="form-container">
                <h2 style="color: var(--neon-purple); text-align:center; margin-bottom: 20px;"><i class="fas fa-terminal"></i> Request a Script</h2>
                <form onsubmit="submitRequest(event)">
                    <input type="text" id="req-discord" class="form-input" placeholder="Discord Tag" required>
                    <textarea id="req-desc" class="form-input" placeholder="Describe your script..." required style="height: 150px;"></textarea>
                    <button type="submit" class="btn-action"><i class="fas fa-paper-plane"></i> Send Request</button>
                </form>
            </div>
        </div>

        <div id="view-admin" class="view-section">
            <div class="form-container" style="max-width: 900px;">
                <h2 style="color: var(--neon-purple); text-align:center; margin-bottom: 30px;"><i class="fas fa-shield-alt"></i> Admin Dashboard</h2>
                
                <div class="admin-section-box">
                    <h3 style="margin-bottom: 15px; color: #fff;"><i class="fas fa-upload"></i> Upload New Script to GitHub</h3>
                    <form id="adminForm" onsubmit="uploadScript(event)">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <input type="text" id="s-title" class="form-input" placeholder="Script Name" required>
                            <input type="text" id="s-version" class="form-input" placeholder="Version (e.g. v1.0)" required>
                            <select id="s-category" class="form-input" style="background-color: #14051e;" required></select>
                            <input type="file" id="s-file" class="form-input" required>
                        </div>
                        <textarea id="s-desc" class="form-input" placeholder="Description..." required style="height: 80px;"></textarea>
                        <button type="submit" id="uploadBtn" class="btn-action"><i class="fas fa-cloud-upload-alt"></i> Publish Script</button>
                    </form>
                </div>

                <div class="admin-section-box">
                    <h3 style="margin-bottom: 15px; color: #fff;"><i class="fas fa-list"></i> Manage Scripts</h3>
                    <div id="adminList" style="display: flex; flex-direction: column; gap: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // تم حذف FacebookAuthProvider من هنا
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        // ============== 🔥 إعدادات FIREBASE الخاصة بك 🔥 ==============
        const firebaseConfig = {
            apiKey: "AIzaSyCP2XATMazqRgf_esuWnNOw-CGDI-nObMc",
            authDomain: "kazza-scripts-68cb4.firebaseapp.com",
            projectId: "kazza-scripts-68cb4",
            messagingSenderId: "809256685228",
            appId: "1:809256685228:web:e3e233f53792cca40ec969",
            measurementId: "G-4BSKH2WLY5"
        };

        // ============== ⚙️ إعدادات GitHub الخاصة بك ⚙️ ==============
        const GITHUB_USERNAME = "rayenamri379-del"; 
        const GITHUB_REPO = "kazza-scripts-storage"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables
        const mainAdmin = 'rayenamri379@gmail.com';
        let currentUser = null;
        let isUserAdmin = false;
        let scriptsDB = [];
        let categoriesDB = ['UI', 'Utility', 'Admin Tools', 'Roleplay'];
        let currentFilter = 'All';

        // --- Auth Functions ---
        window.switchAuthMode = (mode) => {
            document.querySelectorAll('.auth-toggle button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('toggle-' + mode).classList.add('active');
            document.getElementById(mode + '-form').classList.add('active');
            document.getElementById('auth-msg').innerText = '';
        };

        const showMsg = (msg, isError = true) => {
            const m = document.getElementById('auth-msg');
            m.innerText = msg;
            m.className = 'auth-msg ' + (isError ? 'msg-error' : 'msg-success');
        };

        window.handleSignUp = async (e) => {
            e.preventDefault();
            document.getElementById('auth-spinner').style.display = 'block';
            const email = document.getElementById('up-email').value;
            const pass = document.getElementById('up-password').value;
            const userN = document.getElementById('up-username').value;
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCred.user, { displayName: userN });
                showMsg('Account created successfully!', false);
            } catch (error) { showMsg(error.message); }
            document.getElementById('auth-spinner').style.display = 'none';
        };

        window.handleSignIn = async (e) => {
            e.preventDefault();
            document.getElementById('auth-spinner').style.display = 'block';
            const email = document.getElementById('in-email').value;
            const pass = document.getElementById('in-password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (error) { showMsg('Login Failed: ' + error.message); }
            document.getElementById('auth-spinner').style.display = 'none';
        };

        window.handleGoogleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } 
            catch (error) { showMsg(error.message); }
        };

        window.handleLogout = () => signOut(auth);

        // Listen for Auth State - تم إصلاح مشكلة الأدمن هنا
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // استخدام trim() و toLowerCase() لضمان تطابق الإيميل حتى لو كان هناك مسافة بالخطأ
                isUserAdmin = (user.email && user.email.trim().toLowerCase() === mainAdmin.trim().toLowerCase());
                
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-content').classList.add('visible');
                
                // إضافة كلمة (Admin) بجانب الاسم لتتأكد من نجاح العملية
                let displayName = user.displayName || user.email.split('@')[0];
                let adminBadge = isUserAdmin ? ' <span style="color:var(--success);">(👑 Admin)</span>' : '';
                document.getElementById('logoutBtn').innerHTML = `<i class="fas fa-sign-out-alt"></i> Logout (${displayName})${adminBadge}`;
                
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = isUserAdmin ? 'inline-flex' : 'none');
                
                loadScripts();
                if(isUserAdmin) loadAdminPanel();
            } else {
                document.getElementById('app-content').classList.remove('visible');
                document.getElementById('auth-overlay').style.display = 'flex';
                currentUser = null;
                isUserAdmin = false;
            }
        });

        // --- Navigation ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        };

        // --- Scripts & UI ---
        const renderCategoryButtons = () => {
            const filterContainer = document.getElementById('categoryFilters');
            filterContainer.innerHTML = `<button class="cat-btn ${currentFilter === 'All' ? 'active' : ''}" onclick="filterCategory('All')">All</button>`;
            categoriesDB.forEach(cat => {
                filterContainer.innerHTML += `<button class="cat-btn ${currentFilter === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>`;
            });
        };

        window.filterCategory = (cat) => { 
            currentFilter = cat; 
            renderScripts(document.getElementById('searchInput').value.toLowerCase()); 
        };

        // تم إضافة ميزة البحث هنا
        const renderScripts = (searchTerm = '') => {
            renderCategoryButtons();
            const grid = document.getElementById('scriptsGrid');
            grid.innerHTML = ''; 
            
            let filtered = currentFilter === 'All' ? scriptsDB : scriptsDB.filter(s => s.category === currentFilter);
            
            // فلترة بالبحث إذا تم كتابة شيء في مربع البحث
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    s.title.toLowerCase().includes(searchTerm) || 
                    s.desc.toLowerCase().includes(searchTerm)
                );
            }

            if(filtered.length === 0) { 
                grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-muted);">No scripts found.</p>`; 
                return; 
            }

            filtered.forEach(script => {
                grid.innerHTML += `
                    <div class="script-card">
                        <div class="script-header">
                            <h3 class="script-title"><i class="fas fa-file-code"></i> ${script.title}</h3>
                            <span class="version-badge">${script.version}</span>
                        </div>
                        <p class="script-desc">${script.desc}</p>
                        <div class="card-footer">
                            <button class="btn-action btn-sm" onclick="downloadFile('${script.id}', '${script.fileUrl}', '${script.fileName}')" id="btn-dl-${script.id}">
                                <i class="fas fa-download"></i> Download
                            </button>
                            ${isUserAdmin ? `<span class="download-stats"><i class="fas fa-chart-line"></i> ${script.downloads}</span>` : ''}
                        </div>
                    </div>`;
            });
        };

        // تشغيل ميزة البحث عند الكتابة
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderScripts(e.target.value.toLowerCase());
        });

        const loadScripts = async () => {
            const querySnapshot = await getDocs(collection(db, "scripts"));
            scriptsDB = [];
            querySnapshot.forEach((doc) => {
                scriptsDB.push({ id: doc.id, ...doc.data() });
            });
            renderScripts(document.getElementById('searchInput').value.toLowerCase());
        };

        window.downloadFile = async (docId, url, fileName) => {
            const btn = document.getElementById(`btn-dl-${docId}`);
            btn.innerHTML = `<i class="fas fa-spinner loading-spinner" style="display:inline-block"></i>`;
            
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);

                await updateDoc(doc(db, "scripts", docId), { downloads: increment(1) });
                loadScripts(); 
            } catch (error) {
                window.open(url, '_blank');
            }
            btn.innerHTML = `<i class="fas fa-download"></i> Download`;
        };

        // --- Admin Functions ---
        const loadAdminPanel = () => {
            const select = document.getElementById('s-category');
            select.innerHTML = '';
            categoriesDB.forEach(cat => select.innerHTML += `<option value="${cat}">${cat}</option>`);
            
            const list = document.getElementById('adminList');
            list.innerHTML = '';
            scriptsDB.forEach(script => {
                list.innerHTML += `
                    <div class="user-list-item">
                        <div><strong style="color:#fff;">${script.title}</strong> (${script.downloads} DLs)</div>
                        <button onclick="deleteScript('${script.id}')" class="btn-action btn-danger btn-sm"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        };

        window.uploadScript = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            
            let githubToken = sessionStorage.getItem('githubToken');
            
            if (!githubToken) {
                githubToken = prompt("Enter your GitHub Personal Access Token:");
                if (!githubToken) {
                    alert("Upload cancelled: Token is required.");
                    return;
                }
                sessionStorage.setItem('githubToken', githubToken);
            }

            btn.innerHTML = `<i class="fas fa-spinner loading-spinner" style="display:inline-block"></i> Uploading to GitHub...`;
            btn.disabled = true;

            const title = document.getElementById('s-title').value;
            const version = document.getElementById('s-version').value;
            const category = document.getElementById('s-category').value;
            const desc = document.getElementById('s-desc').value;
            const file = document.getElementById('s-file').files[0];

            const reader = new FileReader();
            reader.onloadend = async () => {
                try {
                    const base64data = reader.result.split(',')[1];
                    const cleanFileName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, ''); 
                    const timestamp = Date.now();
                    const finalFileName = `${timestamp}_${cleanFileName}`;
                    
                    const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${finalFileName}`;

                    const response = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: `Upload script: ${title} ${version}`,
                            content: base64data
                        })
                    });

                    if (!response.ok) {
                        if (response.status === 401 || response.status === 403 || response.status === 404) {
                            sessionStorage.removeItem('githubToken');
                            throw new Error("Invalid or Expired GitHub Token. Please try again.");
                        }
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'GitHub Upload Failed');
                    }

                    const data = await response.json();
                    const fileUrl = data.content.download_url; 

                    await addDoc(collection(db, "scripts"), {
                        title, version, category, desc, fileUrl, fileName: finalFileName, downloads: 0, createdAt: new Date()
                    });
                    
                    alert('Script Published to GitHub Successfully!');
                    document.getElementById('adminForm').reset();
                    loadScripts(); loadAdminPanel();
                } catch(err) { 
                    alert('Error: ' + err.message); 
                } finally {
                    btn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Publish Script`;
                    btn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        };

        window.deleteScript = async (id) => {
            if(confirm("Delete this script completely?")) {
                await deleteDoc(doc(db, "scripts", id));
                loadScripts(); loadAdminPanel();
            }
        };

        window.submitRequest = async (e) => {
            e.preventDefault();
            const discord = document.getElementById('req-discord').value;
            const desc = document.getElementById('req-desc').value;
            await addDoc(collection(db, "requests"), { discord, desc, date: new Date(), by: currentUser.email });
            alert('Request sent to admin!');
            e.target.reset();
        }

    </script>
</body>
</html>
